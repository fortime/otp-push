name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write
  packages: write

jobs:
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/otp-push-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-android:
    name: Build and Sign Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > mobile/app/google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON secret is missing. Build will likely fail."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x mobile/gradlew

      - name: Build Release APK
        env:
          DEFAULT_SERVER_URL: ${{ vars.DEFAULT_SERVER_URL }}
        run: |
          GRADLE_ARGS=""
          if [ -n "$DEFAULT_SERVER_URL" ]; then
            GRADLE_ARGS="-PdefaultServerUrl=$DEFAULT_SERVER_URL"
          fi
          cd mobile && ./gradlew assembleRelease $GRADLE_ARGS

      - name: Sign Android Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: mobile/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Rename Signed APK
        run: mv ${{ steps.sign_app.outputs.signedReleaseFile }} otp-push-mobile-${{ github.ref_name }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: otp-push-mobile-${{ github.ref_name }}.apk

  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: [build-docker, build-android]
    steps:
      - name: Download APK Artifact
        uses: actions/download-artifact@v8
        with:
          name: android-apk

      - name: Create Docker Digest File
        run: echo "${{ needs.build-docker.outputs.digest }}" > docker-image-digest.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            otp-push-mobile-*.apk
            docker-image-digest.txt
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
